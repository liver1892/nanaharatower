<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Tower Battle - 6 Poses Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #b0bec5; 
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }
        #game-container { position: relative; margin-top: 15px; }
        canvas { 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            border-radius: 12px; 
            background: #ffffff; 
            max-width: 95vw; 
            max-height: 80vh; 
            touch-action: none;
        }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 12px; box-sizing: border-box;
            display: flex; justify-content: space-between;
        }
        .hud { 
            background: rgba(255,255,255,0.85); 
            padding: 8px 15px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 14px; 
            color: #263238;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #next-preview { 
            width: 70px; height: 70px; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(255,255,255,0.85); 
            border-radius: 12px; 
            margin-top: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #next-preview img { max-width: 85%; max-height: 85%; object-fit: contain; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div>
            <div class="hud">SCORE: <span id="score">0</span></div>
        </div>
        <div style="text-align: right;">
            <div class="hud">NEXT</div>
            <div id="next-preview"></div>
        </div>
    </div>
</div>

<script>
// --- 基本設定 ---
const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

const engine = Engine.create();
const world = engine.world;
const screenWidth = 360; 
const screenHeight = 600; 
let isGameOver = false;
let currentScore = 0;

// --- 画像リスト（pose1 〜 pose6） ---
const poses = [
    'images/pose1.png',
    'images/pose2.png',
    'images/pose3.png',
    'images/pose4.png',
    'images/pose5.png',
    'images/pose6.png'
];
let nextPoseIndex = Math.floor(Math.random() * poses.length);

// --- レンダラー作成 ---
const render = Render.create({
    element: document.getElementById('game-container'),
    engine: engine,
    options: {
        width: screenWidth,
        height: screenHeight,
        wireframes: false,
        background: '#ffffff'
    }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// --- 土台（地面） ---
const ground = Bodies.rectangle(screenWidth / 2, screenHeight - 20, screenWidth * 0.75, 40, { 
    isStatic: true, 
    render: { fillStyle: '#263238' } 
});
Composite.add(world, ground);

// --- NEXTプレビュー更新 ---
function updateNextPreview() {
    const previewContainer = document.getElementById('next-preview');
    previewContainer.innerHTML = `<img src="${poses[nextPoseIndex]}" alt="next">`;
}
updateNextPreview();

// --- パーツ生成 ---
function spawnPerson(x) {
    if (isGameOver) return;

    const imagePath = poses[nextPoseIndex];
    // 次のポーズをランダムに予約
    nextPoseIndex = Math.floor(Math.random() * poses.length);
    updateNextPreview();

    const img = new Image();
    img.src = imagePath;

    img.onload = () => {
        const targetWidth = 60; // パーツの基準幅
        const scale = targetWidth / img.width;
        const targetHeight = img.height * scale;

        const person = Bodies.rectangle(x, 50, targetWidth, targetHeight, {
            restitution: 0.1, // 少し弾む
            friction: 0.9,    // 滑り止め（高め）
            render: {
                sprite: {
                    texture: imagePath,
                    xScale: scale,
                    yScale: scale
                }
            }
        });

        Composite.add(world, person);
    };

    img.onerror = () => {
        console.error("画像読み込み失敗:", imagePath);
        // 画像がない場合でもゲームが止まらないよう次の準備だけする
        updateNextPreview();
    };
}

// --- スコア更新と判定 ---
Events.on(engine, 'afterUpdate', () => {
    if (isGameOver) return;

    const allBodies = Composite.allBodies(world);
    let count = 0;
    
    allBodies.forEach(body => {
        if (!body.isStatic) {
            count++;
            // 画面の下に落ちたらゲームオーバー
            if (body.position.y > screenHeight + 60) {
                isGameOver = true;
                Runner.stop(runner);
                setTimeout(() => {
                    alert("タワーが崩れました！\nSCORE: " + currentScore);
                    window.location.reload();
                }, 100);
            }
        }
    });
    
    currentScore = count;
    document.getElementById('score').innerText = currentScore;
});

// --- 操作イベント（マウス・タッチ） ---
function handleAction(e) {
    if (isGameOver) return;
    
    // タッチの場合はデフォルトのスクロールなどを防止
    if (e.type === 'touchstart') e.preventDefault();

    const rect = render.canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    
    // キャンバス内の相対座標に変換（レスポンシブ対応）
    const scaleX = screenWidth / rect.width;
    const mouseX = (clientX - rect.left) * scaleX;
    
    if (mouseX >= 0 && mouseX <= screenWidth) {
        spawnPerson(mouseX);
    }
}

render.canvas.addEventListener('mousedown', handleAction);
render.canvas.addEventListener('touchstart', handleAction, {passive: false});

</script>
</body>
</html>
