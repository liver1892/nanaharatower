<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Tower Battle - Custom UI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #b0bec5; 
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }
        #game-container { position: relative; margin-top: 15px; }
        canvas { 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            border-radius: 12px; 
            background: #ffffff; 
            max-width: 95vw; 
            max-height: 80vh; 
            touch-action: none;
        }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 12px; box-sizing: border-box;
            display: flex; justify-content: space-between;
        }
        .hud { 
            background: rgba(255,255,255,0.85); 
            padding: 8px 15px; border-radius: 20px; 
            font-weight: bold; font-size: 14px; color: #263238;
        }
        #next-preview { 
            width: 70px; height: 70px; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(255,255,255,0.85); border-radius: 12px; margin-top: 8px;
        }
        #next-preview img { max-width: 85%; max-height: 85%; object-fit: contain; }

        /* 自作ゲームオーバー画面の設定 */
        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none; /* 最初は隠しておく */
            flex-direction: column; align-items: center; justify-content: center;
            color: white; border-radius: 12px; z-index: 100;
            pointer-events: auto; /* ここだけはクリックできるようにする */
        }
        #game-over-screen h2 { font-size: 32px; margin: 0 0 10px 0; }
        #game-over-screen p { font-size: 20px; margin: 0 0 20px 0; }
        #game-over-screen button {
            padding: 10px 30px; font-size: 18px; font-weight: bold;
            cursor: pointer; border: none; border-radius: 25px;
            background: #ff5252; color: white; transition: 0.2s;
        }
        #game-over-screen button:hover { background: #ff1744; transform: scale(1.1); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div><div class="hud">SCORE: <span id="score">0</span></div></div>
        <div style="text-align: right;">
            <div class="hud">NEXT</div>
            <div id="next-preview"></div>
        </div>
    </div>

    <div id="game-over-screen">
        <h2>タワー崩壊！</h2>
        <p>SCORE: <span id="final-score">0</span></p>
        <button onclick="location.reload()">もう一度遊ぶ</button>
    </div>
</div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

const engine = Engine.create();
const world = engine.world;
const screenWidth = 360; 
const screenHeight = 600; 
let isGameOver = false;
let currentScore = 0;

const poses = [
    'images/pose1.png', 'images/pose2.png', 'images/pose3.png',
    'images/pose4.png', 'images/pose5.png', 'images/pose6.png'
];
let nextPoseIndex = Math.floor(Math.random() * poses.length);

const render = Render.create({
    element: document.getElementById('game-container'),
    engine: engine,
    options: { width: screenWidth, height: screenHeight, wireframes: false, background: '#ffffff' }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

const ground = Bodies.rectangle(screenWidth / 2, screenHeight - 20, screenWidth * 0.75, 40, { 
    isStatic: true, render: { fillStyle: '#263238' } 
});
Composite.add(world, ground);

function updateNextPreview() {
    const previewContainer = document.getElementById('next-preview');
    previewContainer.innerHTML = `<img src="${poses[nextPoseIndex]}" alt="next">`;
}
updateNextPreview();

function spawnPerson(x) {
    if (isGameOver) return;
    const img = new Image();
    img.src = poses[nextPoseIndex];
    const imagePath = poses[nextPoseIndex];
    nextPoseIndex = Math.floor(Math.random() * poses.length);
    updateNextPreview();

    img.onload = () => {
        const targetArea = 4500; 
        const aspectRatio = img.width / img.height;
        const targetHeight = Math.sqrt(targetArea / aspectRatio);
        const targetWidth = targetHeight * aspectRatio;
        const scale = targetWidth / img.width;

        const person = Bodies.rectangle(x, 50, targetWidth, targetHeight, {
            restitution: 0.1, friction: 0.9,
            render: { sprite: { texture: imagePath, xScale: scale, yScale: scale } }
        });
        Composite.add(world, person);
    };
}

Events.on(engine, 'afterUpdate', () => {
    if (isGameOver) return;
    const allBodies = Composite.allBodies(world);
    let count = 0;
    allBodies.forEach(body => {
        if (!body.isStatic) {
            count++;
            if (body.position.y > screenHeight + 60) {
                showGameOver();
            }
        }
    });
    currentScore = count;
    document.getElementById('score').innerText = currentScore;
});

function showGameOver() {
    isGameOver = true;
    Runner.stop(runner);
    document.getElementById('final-score').innerText = currentScore;
    document.getElementById('game-over-screen').style.display = 'flex';
}

function handleAction(e) {
    if (isGameOver) return;
    if (e.type === 'touchstart') e.preventDefault();
    const rect = render.canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const scaleX = screenWidth / rect.width;
    const mouseX = (clientX - rect.left) * scaleX;
    if (mouseX >= 0 && mouseX <= screenWidth) {
        spawnPerson(mouseX);
    }
}

render.canvas.addEventListener('mousedown', handleAction);
render.canvas.addEventListener('touchstart', handleAction, {passive: false});

</script>
</body>
</html>
