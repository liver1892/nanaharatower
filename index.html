<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Human Tower Battle - GitHub Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #e0f2f1; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; }
        .msg { background: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <span class="msg">クリックで落下！ (画像: pose1.png, pose2.png, pose3.png が必要)</span>
</div>

<script>
// --- Matter.js の基本モジュール設定 ---
const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

const engine = Engine.create();
const world = engine.world;

// 画面サイズ設定
const screenWidth = 400;
const screenHeight = 700;

const render = Render.create({
    element: document.body,
    engine: engine,
    options: {
        width: screenWidth,
        height: screenHeight,
        wireframes: false, // 画像を表示するために false にする
        background: '#ffffff'
    }
});

Render.run(render);
Runner.run(Runner.create(), engine);

// --- 土台（地面）の作成 ---
const ground = Bodies.rectangle(screenWidth / 2, screenHeight - 20, screenWidth * 0.8, 40, { 
    isStatic: true, 
    render: { fillStyle: '#37474f' } 
});
Composite.add(world, ground);

// --- 画像リスト ---
const poses = ['pose1.png', 'pose2.png', 'pose3.png'];

// --- 人を生成する関数 ---
function spawnPerson(x) {
    // ランダムにポーズを選択
    const imagePath = poses[Math.floor(Math.random() * poses.length)];
    const img = new Image();
    img.src = imagePath;

    // 画像の読み込み完了を待ってから物理体を追加
    img.onload = () => {
        const targetWidth = 80; // 横幅を80pxに固定
        const scale = targetWidth / img.width;
        const targetHeight = img.height * scale;

        const person = Bodies.rectangle(x, 50, targetWidth, targetHeight, {
            restitution: 0.1, // 跳ね返り
            friction: 0.5,    // 摩擦
            render: {
                sprite: {
                    texture: imagePath,
                    xScale: scale,
                    yScale: scale
                }
            }
        });

        Composite.add(world, person);
    };

    // 画像が見つからない場合のエラーハンドリング
    img.onerror = () => {
        alert(imagePath + " が見つかりません。同じフォルダに画像を置いてください。");
    };
}

// --- 操作：クリックした位置に落とす ---
window.addEventListener('mousedown', (e) => {
    // キャンバス内でのクリック座標を取得
    const rect = render.canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    
    // 画面内をクリックした時だけ生成
    if (mouseX > 0 && mouseX < screenWidth) {
        spawnPerson(mouseX);
    }
});

// --- ゲームオーバー判定（簡易版） ---
Events.on(engine, 'afterUpdate', () => {
    const allBodies = Composite.allBodies(world);
    allBodies.forEach(body => {
        // 地面(isStatic)以外の物体が、画面の下に落ちたら判定
        if (!body.isStatic && body.position.y > screenHeight + 100) {
            alert("タワーが崩れました！");
            location.reload(); // リロードしてリセット
        }
    });
});

</script>
</body>
</html>
