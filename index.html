        }
        #bottom-ui { width: 95%; display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; }
        .btn-rotate {

            font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px #c62828;

        }
        #item-list { display: flex; flex-direction: column; gap: 5px; }

        }
