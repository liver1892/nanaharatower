<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Tower Battle - Pro Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #37474f; 
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }
        #game-container { position: relative; margin-top: 10px; }
        canvas { 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-radius: 8px; 
            background: #eceff1; max-width: 95vw; max-height: 70vh; touch-action: none;
        }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 12px; box-sizing: border-box;
            display: flex; justify-content: space-between;
        }
        .hud { background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 10px; color: white; font-weight: bold; }
        #next-preview { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.9); border-radius: 10px; margin-top: 5px; }
        #next-preview img { max-width: 80%; max-height: 80%; }

        /* 回転ボタン（スマホ用） */
        #controls { width: 100%; display: flex; justify-content: center; gap: 20px; margin-top: 10px; pointer-events: auto; }
        .btn { 
            width: 70px; height: 70px; border-radius: 50%; border: none; background: #ff5252; color: white; 
            font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 4px #c62828;
        }
        .btn:active { box-shadow: none; transform: translateY(4px); }

        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; border-radius: 8px; z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div><div class="hud">SCORE: <span id="score">0</span></div></div>
        <div style="text-align: right;">
            <div class="hud">NEXT</div>
            <div id="next-preview"></div>
        </div>
    </div>
    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <p style="font-size: 24px;">TOTAL SCORE: <span id="final-score">0</span></p>
        <button style="padding: 10px 30px; font-size: 18px; border-radius: 20px; border: none; background: #4caf50; color: white;" onclick="location.reload()">RETRY</button>
    </div>
</div>

<div id="controls">
    <button class="btn" id="rotate-left">↺</button>
    <button class="btn" id="rotate-right">↻</button>
</div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

const engine = Engine.create();
const world = engine.world;
const screenWidth = 360; 
const screenHeight = 550; 
let isGameOver = false;
let totalScore = 0;
let currentRotation = 0; // 現在の回転角度（ラジアン）

const poses = ['images/pose1.png', 'images/pose2.png', 'images/pose3.png', 'images/pose4.png', 'images/pose5.png', 'images/pose6.png'];
let nextPoseIndex = Math.floor(Math.random() * poses.length);

const render = Render.create({
    element: document.getElementById('game-container'),
    engine: engine,
    options: { width: screenWidth, height: screenHeight, wireframes: false, background: '#ffffff' }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

const ground = Bodies.rectangle(screenWidth / 2, screenHeight - 20, screenWidth * 0.7, 40, { 
    isStatic: true, render: { fillStyle: '#263238' } 
});
Composite.add(world, ground);

function updateNextPreview() {
    const previewContainer = document.getElementById('next-preview');
    previewContainer.innerHTML = `<img src="${poses[nextPoseIndex]}" style="transform: rotate(${currentRotation}rad)">`;
}
updateNextPreview();

// 回転操作
function rotate(dir) {
    currentRotation += dir * (Math.PI / 8); // 22.5度ずつ回転
    updateNextPreview();
}
document.getElementById('rotate-left').onclick = () => rotate(-1);
document.getElementById('rotate-right').onclick = () => rotate(1);
window.onkeydown = (e) => {
    if(e.key === 'ArrowLeft') rotate(-1);
    if(e.key === 'ArrowRight') rotate(1);
}

function spawnPerson(x) {
    if (isGameOver) return;
    const imagePath = poses[nextPoseIndex];
    const img = new Image();
    img.src = imagePath;

    img.onload = () => {
        const targetArea = 4000; 
        const aspectRatio = img.width / img.height;
        const targetHeight = Math.sqrt(targetArea / aspectRatio);
        const targetWidth = targetHeight * aspectRatio;
        const scale = targetWidth / img.width;

        const person = Bodies.rectangle(x, 60, targetWidth, targetHeight, {
            restitution: 0.1, friction: 0.9, angle: currentRotation, // 保存された角度で生成
            render: { sprite: { texture: imagePath, xScale: scale, yScale: scale } }
        });
        Composite.add(world, person);
        
        // 生成後に次の準備
        nextPoseIndex = Math.floor(Math.random() * poses.length);
        currentRotation = 0; // 角度リセット
        updateNextPreview();
    };
}

// スコア計算：高さボーナス
Events.on(engine, 'afterUpdate', () => {
    if (isGameOver) return;
    const allBodies = Composite.allBodies(world);
    let tempScore = 0;
    
    allBodies.forEach(body => {
        if (!body.isStatic) {
            // 地面からの高さが高いほど高得点 (地面は screenHeight-40 あたり)
            const heightBonus = Math.max(0, Math.floor((screenHeight - 40 - body.position.y) / 10));
            tempScore += (100 + heightBonus * 10); 

            if (body.position.y > screenHeight + 50) {
                isGameOver = true;
                Runner.stop(runner);
                document.getElementById('final-score').innerText = totalScore;
                document.getElementById('game-over-screen').style.display = 'flex';
            }
        }
    });
    totalScore = tempScore;
    document.getElementById('score').innerText = totalScore;
});

function handleAction(e) {
    if (isGameOver || e.target.closest('button')) return;
    const rect = render.canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const mouseX = (clientX - rect.left) * (screenWidth / rect.width);
    if (mouseX >= 0 && mouseX <= screenWidth) spawnPerson(mouseX);
}

render.canvas.addEventListener('mousedown', handleAction);
render.canvas.addEventListener('touchstart', handleAction);

</script>
</body>
</html>
