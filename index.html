<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Tower Battle - Advanced</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #cfd8dc; 
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }
        #game-container { position: relative; margin-top: 10px; }
        canvas { box-shadow: 0 10px 20px rgba(0,0,0,0.2); border-radius: 8px; background: #fff; max-width: 95vw; max-height: 80vh; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 10px; box-sizing: border-box;
            display: flex; justify-content: space-between;
        }
        .hud { background: rgba(255,255,255,0.8); padding: 5px 15px; border-radius: 15px; font-weight: bold; font-size: 14px; color: #37474f; }
        #next-preview { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.8); border-radius: 10px; margin-top: 5px; }
        #next-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div>
            <div class="hud">SCORE: <span id="score">0</span></div>
        </div>
        <div style="text-align: right;">
            <div class="hud">NEXT</div>
            <div id="next-preview"></div>
        </div>
    </div>
</div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

const engine = Engine.create();
const world = engine.world;
const screenWidth = 360; // スマホで見やすい幅
const screenHeight = 600; 
let isGameOver = false;
let currentScore = 0;

// 画像リスト
const poses = ['images/pose1.png', 'images/pose2.png', 'images/pose3.png'];
let nextPoseIndex = Math.floor(Math.random() * poses.length);

const render = Render.create({
    element: document.getElementById('game-container'),
    engine: engine,
    options: { width: screenWidth, height: screenHeight, wireframes: false, background: '#ffffff' }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// 地面
const ground = Bodies.rectangle(screenWidth / 2, screenHeight - 20, screenWidth * 0.8, 40, { 
    isStatic: true, render: { fillStyle: '#455a64' } 
});
Composite.add(world, ground);

// 次のパーツを更新
function updateNextPreview() {
    const previewContainer = document.getElementById('next-preview');
    previewContainer.innerHTML = `<img src="${poses[nextPoseIndex]}">`;
}
updateNextPreview();

// 人を生成
function spawnPerson(x) {
    if (isGameOver) return;

    const imagePath = poses[nextPoseIndex];
    nextPoseIndex = Math.floor(Math.random() * poses.length); // 次を決定
    updateNextPreview();

    const img = new Image();
    img.src = imagePath;

    img.onload = () => {
        const targetWidth = 60; // パーツを小さく（100 -> 60）
        const scale = targetWidth / img.width;
        const targetHeight = img.height * scale;

        const person = Bodies.rectangle(x, 50, targetWidth, targetHeight, {
            restitution: 0.1, friction: 0.8,
            render: { sprite: { texture: imagePath, xScale: scale, yScale: scale } }
        });
        Composite.add(world, person);
    };
}

// スコア更新とゲームオーバー判定
Events.on(engine, 'afterUpdate', () => {
    if (isGameOver) return;

    const allBodies = Composite.allBodies(world);
    let count = 0;
    
    allBodies.forEach(body => {
        if (!body.isStatic) {
            count++;
            if (body.position.y > screenHeight + 50) {
                isGameOver = true;
                Runner.stop(runner);
                setTimeout(() => {
                    alert("GAME OVER! SCORE: " + currentScore);
                    window.location.reload();
                }, 100);
            }
        }
    });
    
    currentScore = count;
    document.getElementById('score').innerText = currentScore;
});

// 操作（マウス & タッチ共通）
function handleAction(e) {
    e.preventDefault();
    const rect = render.canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const mouseX = (clientX - rect.left) * (screenWidth / rect.width);
    
    if (mouseX >= 0 && mouseX <= screenWidth) {
        spawnPerson(mouseX);
    }
}

render.canvas.addEventListener('mousedown', handleAction);
render.canvas.addEventListener('touchstart', handleAction, {passive: false});

</script>
</body>
</html>
