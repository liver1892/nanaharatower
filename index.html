<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Tower Battle - Complete</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #e0f2f1; 
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas { 
            box-shadow: 0 0 30px rgba(0,0,0,0.3); 
            border: 4px solid #37474f;
            background: #fff;
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            width: 100%; 
            text-align: center; 
            pointer-events: none; 
            z-index: 10;
        }
        .msg { 
            background: rgba(255,255,255,0.9); 
            padding: 10px 25px; 
            border-radius: 30px; 
            font-weight: bold; 
            font-size: 18px;
            color: #37474f;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div id="ui">
    <span class="msg">クリックでポーズを落とせ！</span>
</div>

<script>
// --- 設定 ---
const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

const engine = Engine.create();
const world = engine.world;

const screenWidth = 400;
const screenHeight = 700;
let isGameOver = false;

// --- 描画設定 ---
const render = Render.create({
    element: document.body,
    engine: engine,
    options: {
        width: screenWidth,
        height: screenHeight,
        wireframes: false, // 画像を表示するために必須
        background: '#ffffff'
    }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// --- 土台（地面） ---
const ground = Bodies.rectangle(screenWidth / 2, screenHeight - 40, screenWidth * 0.7, 40, { 
    isStatic: true, 
    render: { fillStyle: '#37474f' } 
});
Composite.add(world, ground);

// --- 画像フォルダ内のリスト ---
const poses = ['images/pose1.png', 'images/pose2.png', 'images/pose3.png'];

// --- 人を生成する関数 ---
function spawnPerson(x) {
    if (isGameOver) return;

    const imagePath = poses[Math.floor(Math.random() * poses.length)];
    const img = new Image();
    img.src = imagePath;

    img.onload = () => {
        // 横幅を100pxに基準化し、縦横比を維持
        const targetWidth = 100;
        const scale = targetWidth / img.width;
        const targetHeight = img.height * scale;

        const person = Bodies.rectangle(x, 60, targetWidth, targetHeight, {
            restitution: 0.1, // 跳ね返り（低いと安定する）
            friction: 0.6,    // 摩擦（高いと滑りにくい）
            slop: 0.05,
            render: {
                sprite: {
                    texture: imagePath,
                    xScale: scale,
                    yScale: scale
                }
            }
        });

        Composite.add(world, person);
    };

    img.onerror = () => {
        console.error("画像が見つかりません:", imagePath);
    };
}

// --- 操作：マウス操作 ---
window.addEventListener('mousedown', (e) => {
    const rect = render.canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    
    // キャンバス内をクリックした時のみ実行
    if (mouseX >= 0 && mouseX <= screenWidth) {
        spawnPerson(mouseX);
    }
});

// --- ゲームオーバー判定 ---
Events.on(engine, 'afterUpdate', () => {
    if (isGameOver) return;

    const allBodies = Composite.allBodies(world);
    allBodies.forEach(body => {
        // 静止物体（地面）以外が、画面下部+100pxを超えたら終了
        if (!body.isStatic && body.position.y > screenHeight + 100) {
            isGameOver = true;
            
            // 物理演算を一時停止してアラート
            Runner.stop(runner);
            
            setTimeout(() => {
                alert("タワーが崩れました！");
                // ページを完全にリロードしてリセット
                window.location.reload();
            }, 100);
        }
    });
});
</script>
</body>
</html>
