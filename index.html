<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Tower Battle - Best Score Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #263238; 
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; position: fixed; width: 100%;
            user-select: none; -webkit-user-select: none;
        }
        #game-container { position: relative; margin-top: 40px; }
        canvas { 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-radius: 8px; 
            background: #eceff1; max-width: 90vw; max-height: 55vh; touch-action: none;
        }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 12px; box-sizing: border-box;
            display: flex; justify-content: space-between;
        }
        .hud { background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 10px; color: white; font-weight: bold; font-size: 12px; }
        #next-preview { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.9); border-radius: 10px; margin-top: 5px; }
        #next-preview img { max-width: 80%; max-height: 80%; }

        #bottom-ui { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 10px; }
        .btn-row { display: flex; gap: 20px; }
        .btn { 
            width: 70px; height: 70px; border-radius: 50%; border: none; background: #ff5252; color: white; 
            font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px #c62828;
        }
        .shop-btn {
            background: #ffa000; box-shadow: 0 4px #e68a00; border-radius: 10px; width: auto; height: auto; padding: 10px 15px;
        }

        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; border-radius: 8px; z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div>
            <div class="hud">SCORE: <span id="score">0</span></div>
            <div class="hud" style="margin-top:5px; background:#ffa000;">MONEY: <span id="money">0</span></div>
        </div>
        <div style="text-align: right;">
            <div class="hud">NEXT</div>
            <div id="next-preview"></div>
        </div>
    </div>
    <div id="game-over-screen">
        <h1 style="font-size: 40px;">なんでぇ～</h1>
        <p style="font-size: 20px;">今回のスコア: <span id="final-score">0</span></p>
        <button style="padding: 12px 40px; font-size: 18px; border-radius: 30px; border: none; background: #4caf50; color: white; font-weight: bold;" onclick="restartGame()">もう1回</button>
    </div>
</div>

<div id="bottom-ui">
    <div class="btn-row">
        <button class="btn" id="rotate-btn">回転</button>
        <button class="btn shop-btn" id="buy-ground-btn">土台拡張<br><span id="ground-price">1000</span>pt</button>
    </div>
</div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

let engine = Engine.create();
let world = engine.world;
const screenWidth = 360; 
const screenHeight = 550; 

// ゲーム状態
let isGameOver = false;
let currentScore = 0; // リアルタイムの計算用
let bestScoreInRound = 0; // このラウンドでの最高得点（★ここを追加）
let walletMoney = parseInt(localStorage.getItem('humanTowerMoney')) || 0; 
let groundWidthLevel = 1;
let currentRotation = 0;
let canSpawn = true;

const poses = [
    'images/pose1.png', 'images/pose2.png', 'images/pose3.png',
    'images/pose4.png', 'images/pose5.png', 'images/pose6.png',
    'images/pose7.png', 'images/pose8.png', 'images/pose9.png'
];
let nextPoseIndex = Math.floor(Math.random() * poses.length);

const render = Render.create({
    element: document.getElementById('game-container'),
    engine: engine,
    options: { width: screenWidth, height: screenHeight, wireframes: false, background: '#ffffff' }
});

Render.run(render);
let runner = Runner.create();
Runner.run(runner, engine);

let ground;
function initGround() {
    if(ground) Composite.remove(world, ground);
    const width = screenWidth * (0.4 + (groundWidthLevel * 0.1));
    ground = Bodies.rectangle(screenWidth / 2, screenHeight - 20, width, 40, { 
        isStatic: true, render: { fillStyle: '#263238' } 
    });
    Composite.add(world, ground);
}
initGround();

function updateUI() {
    document.getElementById('money').innerText = walletMoney;
    // 表示するのは常にそのラウンドの最高得点（下がらないスコア）
    document.getElementById('score').innerText = bestScoreInRound;
    document.getElementById('ground-price').innerText = groundWidthLevel * 1000;
}
updateUI();

document.getElementById('buy-ground-btn').addEventListener('click', () => {
    const price = groundWidthLevel * 1000;
    if (walletMoney >= price) {
        walletMoney -= price;
        groundWidthLevel++;
        localStorage.setItem('humanTowerMoney', walletMoney);
        initGround();
        updateUI();
    } else {
        alert("ポイントが足りないよ！もっと積んで稼いでね。");
    }
});

function updateNextPreview() {
    const previewContainer = document.getElementById('next-preview');
    const deg = (currentRotation * 180) / Math.PI;
    previewContainer.innerHTML = `<img src="${poses[nextPoseIndex]}" style="transform: rotate(${deg}deg)">`;
}
updateNextPreview();

function rotate90() {
    currentRotation += Math.PI / 2;
    updateNextPreview();
}
document.getElementById('rotate-btn').onclick = rotate90;

function spawnPerson(x) {
    if (isGameOver || !canSpawn) return;
    canSpawn = false; 
    const img = new Image();
    img.src = poses[nextPoseIndex];
    const path = poses[nextPoseIndex];

    img.onload = () => {
        const targetArea = 4500; 
        const aspectRatio = img.width / img.height;
        const targetHeight = Math.sqrt(targetArea / aspectRatio);
        const targetWidth = targetHeight * aspectRatio;
        const scale = targetWidth / img.width;

        const person = Bodies.rectangle(x, 60, targetWidth, targetHeight, {
            restitution: 0.1, friction: 0.9, angle: currentRotation,
            render: { sprite: { texture: path, xScale: scale, yScale: scale } }
        });
        Composite.add(world, person);
        nextPoseIndex = Math.floor(Math.random() * poses.length);
        currentRotation = 0; 
        updateNextPreview();
        setTimeout(() => { canSpawn = true; }, 500);
    };
}

Events.on(engine, 'afterUpdate', () => {
    if (isGameOver) return;
    const allBodies = Composite.allBodies(world);
    let tempScore = 0;
    
    allBodies.forEach(body => {
        if (!body.isStatic) {
            if (body.position.y > screenHeight + 60) {
                gameOver();
                return;
            }
            const speed = Math.sqrt(body.velocity.x ** 2 + body.velocity.y ** 2);
            if (speed < 0.2) { 
                const heightBonus = Math.max(0, Math.floor((screenHeight - 40 - body.position.y) / 10));
                tempScore += (100 + heightBonus * 10);
            }
        }
    });

    // 現在の計算スコアが最高記録を上回った場合のみ更新
    if (tempScore > bestScoreInRound) {
        bestScoreInRound = tempScore;
    }
    
    document.getElementById('score').innerText = bestScoreInRound;
});

function gameOver() {
    isGameOver = true;
    Runner.stop(runner);
    walletMoney += bestScoreInRound; // 最高得点をMONEYに加算
    localStorage.setItem('humanTowerMoney', walletMoney);
    document.getElementById('final-score').innerText = bestScoreInRound;
    document.getElementById('game-over-screen').style.display = 'flex';
    updateUI();
}

function restartGame() {
    Composite.clear(world, false);
    initGround();
    isGameOver = false;
    currentScore = 0;
    bestScoreInRound = 0; // 次のゲームのためにリセット
    document.getElementById('game-over-screen').style.display = 'none';
    Runner.run(runner, engine);
    updateUI();
}

let isDragging = false;
function handleStart(e) { if (e.target.closest('button')) return; isDragging = true; }
function handleEnd(e) {
    if (!isDragging || isGameOver || e.target.closest('button')) return;
    const rect = render.canvas.getBoundingClientRect();
    const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const mouseX = (clientX - rect.left) * (screenWidth / rect.width);
    spawnPerson(mouseX);
    isDragging = false;
}
render.canvas.addEventListener('mousedown', handleStart);
window.addEventListener('mouseup', handleEnd);
render.canvas.addEventListener('touchstart', handleStart);
window.addEventListener('touchend', handleEnd);
</script>
</body>
</html>
