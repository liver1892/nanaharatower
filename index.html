<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        /* 画面全体の設定：真っ暗にならないよう背景色を指定 */
        body {
            margin: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* ゲーム画面の外枠 */
        #game-stage {
            position: relative;
            width: 600px;
            height: 400px;
            background-color: #87CEEB; /* 空の色 */
            border: 4px solid #333;
            overflow: hidden;
        }

        /* プレイヤー（寿司を食べて太る対象） */
        #player {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 50px;
            height: 50px;
            background-color: #ff4500;
            border-radius: 5px;
            transition: width 0.3s ease, transform 0.3s ease;
            z-index: 10;
        }

        /* 以前「穴」が開いていた床の修正 */
        .floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%; /* 穴を塞ぐために100%に固定 */
            height: 50px;
            background-color: #8B4513; /* 土の色 */
        }

        /* 寿司アイテム */
        #sushi {
            position: absolute;
            bottom: 60px;
            left: 300px;
            font-size: 30px;
            cursor: pointer;
        }

        /* 横幅1.5倍にするためのクラス（JavaScriptで付与） */
        .expanded {
            width: 75px !important; /* 50px * 1.5 */
            background-color: #ff8c00 !important;
        }

        /* メッセージ表示 */
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <div id="game-stage">
        <div id="ui">寿司をクリックして横幅を1.5倍にしよう！</div>
        
        <div id="player"></div>

        <div id="sushi" onclick="eatSushi()">🍣</div>

        <div class="floor"></div>
    </div>

    <script>
        function eatSushi() {
            const player = document.getElementById('player');
            const ui = document.getElementById('ui');
            
            // 横幅1.5倍クラスを切り替え
            player.classList.toggle('expanded');
            
            if (player.classList.contains('expanded')) {
                ui.innerText = "効果発動中：横幅1.5倍！";
            } else {
                ui.innerText = "通常サイズ";
            }
        }
    </script>

</body>
</html>
